<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Timesheet Mensile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { font-family: Arial, sans-serif; margin: 10px; }
        h2 { font-size: 1.5em; margin-bottom: 10px; }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        .controls label {
            font-size: 14px;
            display: flex;
            flex-direction: column;
        }

        .controls select, .controls input {
            padding: 6px;
            font-size: 14px;
        }

        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 12px;
            min-width: 900px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 5px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
            font-size: 13px;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            box-sizing: border-box;
            font-size: 12px;
            padding: 5px;
        }

        .weekend {
            background-color: #ffe6e6;
        }

        #btn-compila {
            margin-top: 10px;
            padding: 12px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
        }

        /* MOBILE VIEW */
        @media (max-width: 600px) {

            body {
                margin: 5px;
                font-size: 14px;
            }

            h2 {
                text-align: center;
                font-size: 1.2em;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            table, thead, tbody, th, td, tr {
                display: block;
                width: 100%;
            }

            thead {
                display: none;
            }

            tr {
                margin-bottom: 15px;
                border: 1px solid #ccc;
                border-radius: 8px;
                padding: 10px;
                background: #fff;
            }

            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border: none;
                padding: 6px 0;
            }

            td::before {
                content: attr(data-label);
                font-weight: bold;
                font-size: 12px;
                color: #555;
            }

            input {
                width: 60%;
            }
        }
    </style>
</head>

<body>

<h2 id="titolo"></h2>

<div class="controls">
    <label>Seleziona Mese:
        <select id="mese-select"></select>
    </label>
    <label>Località:
        <input type="text" id="global-localita">
    </label>
    <label>Cliente:
        <input type="text" id="global-cliente">
    </label>
    <label>Descrizione attività:
        <input type="text" id="global-attivita">
    </label>
</div>

<div class="table-container">
    <table>
        <thead>
        <tr>
            <th>Giorno</th>
            <th>LOCALITA'</th>
            <th>CLIENTE</th>
            <th>ATTIVITA'</th>
            <th>ORE ORD</th>
            <th>STRAORD</th>
            <th>ASSENZA</th>
            <th>MOTIVO</th>
            <th>TRASFERTA</th>
            <th>INDENNITA'</th>
            <th>VIAGGIO</th>
        </tr>
        </thead>
        <tbody id="corpo-tabella"></tbody>
    </table>
</div>

<button id="btn-compila">Compila</button>

<script>
    const oggi = new Date();
    const annoCorrente = oggi.getFullYear();

    const nomiMesi = [
        "Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno",
        "Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"
    ];

    const meseSelect = document.getElementById("mese-select");

    nomiMesi.forEach((nome, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.text = nome;
        if (index === oggi.getMonth()) option.selected = true;
        meseSelect.appendChild(option);
    });

    const titolo = document.getElementById("titolo");
    const tbody = document.getElementById("corpo-tabella");

    function generaTabella(mese) {
        tbody.innerHTML = "";

        const giorniNelMese = new Date(annoCorrente, mese + 1, 0).getDate();
        titolo.innerText = `Timesheet - ${nomiMesi[mese]} ${annoCorrente}`;

        for (let i = 1; i <= giorniNelMese; i++) {

            const data = new Date(annoCorrente, mese, i);
            const giornoSettimana = data.getDay();
            const classe = (giornoSettimana === 0 || giornoSettimana === 6) ? "weekend" : "";

            const riga = document.createElement("tr");
            riga.className = classe;

            riga.innerHTML = `
                <td data-label="Giorno">${i}</td>
                <td data-label="Località"><input type="text" class="localita"></td>
                <td data-label="Cliente"><input type="text" class="cliente"></td>
                <td data-label="Attività"><input type="text" class="attivita"></td>
                <td data-label="Ore Ord"><input type="number" step="0.5" value="${classe ? '' : 8}"></td>
                <td data-label="Straord"><input type="number" step="0.5"></td>
                <td data-label="Assenza"><input type="number" step="0.5"></td>
                <td data-label="Motivo"><input type="text" class="motivo"></td>
                <td data-label="Trasferta"><input type="text" class="trasferta"></td>
                <td data-label="Indennità"><input type="text" class="indennita"></td>
                <td data-label="Viaggio"><input type="text" class="viaggio"></td>
            `;

            const inputMotivo = riga.querySelector(".motivo");

            inputMotivo.addEventListener("input", function() {
                if (this.value.trim() !== "") {
                    const altri = ["localita","cliente","attivita","trasferta","indennita","viaggio"];
                    altri.forEach(c => riga.querySelector("." + c).value = "");

                    riga.querySelectorAll("input[type='number']").forEach(n => n.value = "");
                }
            });

            tbody.appendChild(riga);
        }
    }

    function aggiornaCampi(classe, valore) {
        document.querySelectorAll("." + classe).forEach(campo => {
            const riga = campo.closest("tr");
            if (!riga.classList.contains("weekend")) {
                campo.value = valore;
            }
        });
    }

    document.getElementById("global-localita").addEventListener("input", e => aggiornaCampi("localita", e.target.value));
    document.getElementById("global-cliente").addEventListener("input", e => aggiornaCampi("cliente", e.target.value));
    document.getElementById("global-attivita").addEventListener("input", e => aggiornaCampi("attivita", e.target.value));

    meseSelect.addEventListener("change", function() {
        generaTabella(parseInt(this.value));
    });

    generaTabella(oggi.getMonth());

    function getTimesheetDataForJava() {
        const righe = [];

        tbody.querySelectorAll("tr").forEach(tr => {
            const cells = tr.querySelectorAll("td");

            righe.push({
                day: parseInt(cells[0].textContent),
                localita: cells[1].querySelector("input").value,
                cliente: cells[2].querySelector("input").value,
                attivita: cells[3].querySelector("input").value,
                oreOrdinarie: parseInt(cells[4].querySelector("input").value),
                oreStraordinarie: parseInt(cells[5].querySelector("input").value),
                oreAssenza: parseInt(cells[6].querySelector("input").value),
                motivoAssenza: cells[7].querySelector("input").value,
                trasferta: cells[8].querySelector("input").value,
                indennita: cells[9].querySelector("input").value,
                viaggio: cells[10].querySelector("input").value
            });
        });

        return {
            mese: parseInt(meseSelect.value) + 1,
            rowDataList: righe
        };
    }

    document.getElementById("btn-compila").addEventListener("click", function() {

        const body = getTimesheetDataForJava();

        fetch("/xlsx/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        })
        .then(res => {
            if (!res.ok) throw new Error();
            return res.blob();
        })
        .then(blob => {
            const meseIndex = parseInt(meseSelect.value);
            const nomeMeseUpper = nomiMesi[meseIndex].toUpperCase();

            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `GIORNALIERA PINTUS GIUSEPPE ${nomeMeseUpper}.xlsx`;

            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);
        })
        .catch(() => alert("Errore nel download"));
    });
</script>

</body>
</html>
